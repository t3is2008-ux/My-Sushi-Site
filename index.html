<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>My Sushi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            text-align: center;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 52px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            opacity: 0.85;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>MY SUSHI</h1>
        <p>Sushi fresh • rapid • to go</p>
        <a href="#" class="btn">În curând</a>
    </section>
</body>
</html>
